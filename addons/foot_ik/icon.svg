  <rect x="2" y="6" width="3" height="5" rx="1" fill="#7ecfff"/>
  <!-- Toes -->
  <rect x="2" y="12" width="2" height="2" rx="1" fill="#a8e0ff"/>
  <rect x="4.5" y="12" width="2" height="2" rx="1" fill="#a8e0ff"/>
  <rect x="7" y="12" width="2" height="2" rx="1" fill="#a8e0ff"/>
